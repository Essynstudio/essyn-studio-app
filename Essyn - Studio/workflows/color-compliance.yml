# ═══════════════════════════════════════════════════════════════════════
#  ESSYN — Color Compliance CI
#  ─────────────────────────────────────────────────────────────────────
#  Runs on every push and PR to ensure no prohibited legacy colors
#  or transparency violations are introduced.
#
#  Two-pass strategy:
#    1. Fast grep pass — catches obvious violations in seconds
#    2. Full TypeScript lint — deep scan with programmatic checker
# ═══════════════════════════════════════════════════════════════════════

name: Color Compliance

on:
  push:
    branches: [main, develop, staging]
    paths:
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - "src/**/*.css"
  pull_request:
    paths:
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - "src/**/*.css"

concurrency:
  group: color-compliance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-colors:
    name: Apple HIG Color Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Pass 1: Fast grep scan ──
      # Catches the most common violations in under 1 second.
      # Uses a simplified pattern of the top ~60 most frequent offenders.
      - name: "Pass 1: Grep — prohibited colors"
        run: |
          echo "══════════════════════════════════════════"
          echo "  Pass 1: Fast grep scan"
          echo "══════════════════════════════════════════"

          VIOLATIONS=$(grep -rniE \
            "#(F0F0F0|F3F3F3|F8F8F8|FBFBFB|FCFCFC|FEFEFE|F2F2F2|F9F9F9|E5E5E5|E7E7E7|E8E8E8|E2E2E2|E0E0E0|DBDBDB|D5D5D5|D4D4D4|D0D0D0|D9D9D9|D1D1D1|CCCCCC|CFCFCF|CACACA|C8C8C8|C4C4C4|C1C1C1|B8B8B8|B3B3B3|ACACAC|AAAAAA|A5A5A5|A0A0A0|9B9B9B|999999|949494|8D8D8D|8C8C8C|888888|838383|7C7C7C|777777|707070|6B6B6B|666666|646464|606060|595959|585858|555555|4D4D4D|4C4C4C|474747|404040|353535|333333|292929|2B2B2B|2A2A2A|262626|222222|CC3333|DC2626|E35252|2563EB|D97706|16A34A|F97316)" \
            --include="*.tsx" --include="*.ts" \
            src/ \
            | grep -v "color-compliance" \
            | grep -v "color-lint" \
            || true)

          if [ -n "$VIOLATIONS" ]; then
            echo ""
            echo "❌ Prohibited colors found:"
            echo "$VIOLATIONS"
            echo ""
            echo "Fix: Replace with Apple HIG equivalents."
            echo "Reference: src/app/lib/color-compliance.ts"
            exit 1
          else
            echo "✅ Pass 1 clean — no grep violations."
          fi

      # ── Pass 2: Transparency check ──
      - name: "Pass 2: Grep — transparency violations"
        run: |
          echo "══════════════════════════════════════════"
          echo "  Pass 2: Transparency check"
          echo "══════════════════════════════════════════"

          VIOLATIONS=$(grep -rniE \
            "(rgba\(|hsla\(|#[0-9a-fA-F]{8}\b)" \
            --include="*.tsx" --include="*.ts" --include="*.css" \
            src/ \
            | grep -v "color-compliance" \
            | grep -v "color-lint" \
            | grep -v "HeroBirds" \
            || true)

          if [ -n "$VIOLATIONS" ]; then
            echo ""
            echo "❌ Transparency violations found:"
            echo "$VIOLATIONS"
            echo ""
            echo "Fix: Use CSS opacity property instead of rgba()/hsla()/#RRGGBBAA."
            exit 1
          else
            echo "✅ Pass 2 clean — no transparency violations."
          fi

      # ── Pass 3: Tailwind opacity modifiers ──
      - name: "Pass 3: Grep — Tailwind opacity modifiers"
        run: |
          echo "══════════════════════════════════════════"
          echo "  Pass 3: Tailwind opacity modifiers"
          echo "══════════════════════════════════════════"

          VIOLATIONS=$(grep -rniE \
            "(bg|text|border|ring|shadow|fill|stroke)-[a-zA-Z]+-?[0-9]*/[0-9]+" \
            --include="*.tsx" --include="*.ts" \
            src/ \
            | grep -v "color-compliance" \
            | grep -v "color-lint" \
            || true)

          if [ -n "$VIOLATIONS" ]; then
            echo ""
            echo "❌ Tailwind opacity modifiers found:"
            echo "$VIOLATIONS"
            echo ""
            echo "Fix: Use opacity-[n] utility or CSS opacity property."
            exit 1
          else
            echo "✅ Pass 3 clean — no Tailwind opacity modifiers."
          fi

      # ── Pass 4: Full programmatic lint ──
      - name: "Pass 4: Full TypeScript lint"
        run: |
          echo "══════════════════════════════════════════"
          echo "  Pass 4: Full programmatic lint (220+ colors)"
          echo "══════════════════════════════════════════"
          npx tsx scripts/lint-colors.ts

      # ── Summary ──
      - name: Summary
        if: success()
        run: |
          echo ""
          echo "══════════════════════════════════════════"
          echo "  ✅ ALL COLOR COMPLIANCE CHECKS PASSED"
          echo "══════════════════════════════════════════"
          echo ""
          echo "  Apple HIG 2026 palette: enforced"
          echo "  Transparency rule: enforced"
          echo "  Tailwind modifiers: enforced"
          echo ""
